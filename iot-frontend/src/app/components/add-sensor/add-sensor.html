<div class="modal-overlay" *ngIf="authService.isAdmin()" (click)="closeModal.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <div class="icon-circle">➕</div>
      <div>
        <h3>Novi Senzor i Pravila</h3>
        <p>Kreirajte senzor i definišite pripadajuća pravila uporedo</p>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="modal-body-grid">
        
        <div class="column-left">
          <h4 class="section-title">📊 Osnovni podaci</h4>
          
          <div class="form-group">
            <label>Naziv</label>
            <input type="text" [(ngModel)]="sensorData.name" name="name" required placeholder="Npr. Termostat Hladnjača...">
          </div>

          <div class="form-group">
            <label>Lokacija</label>
            <input type="text" [(ngModel)]="sensorData.location" name="location" required placeholder="Npr. Komora 1...">
          </div>

          <div class="form-group">
            <label>Merna jedinica</label>
            <select [(ngModel)]="sensorData.unit" name="unit" required>
              <option value="" disabled selected>Izaberite jedinicu</option>
              <option value="°C">Temperatura (°C)</option>
              <option value="%">Vlažnost (%)</option>
              <option value="bar">Pritisak (bar)</option>
              <option value="V">Napon (V)</option>
            </select>
          </div>
        </div>

        <div class="column-right">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h4 class="section-title" style="margin: 0;">⚙️ Pravila za incidente</h4>
            <button type="button" class="btn-add-rule" (click)="addRule()">
              ➕ Dodaj pravilo
            </button>
          </div>

          <div class="rules-container">
            <div *ngFor="let alarm of sensorData.alarms; let i = index" class="rule-row">
              
              <div class="form-group row-item">
                <label>Ozbiljnost</label>
                <select [(ngModel)]="alarm.severity" name="severity-{{i}}" required>
                  <option value="LOW">LOW</option>
                  <option value="MEDIUM">MEDIUM</option>
                  <option value="HIGH">HIGH</option>
                  <option value="CRITICAL">CRITICAL</option>
                </select>
              </div>

              <div class="form-group row-item">
                <label>Min (Donja)</label>
                <input type="text" inputmode="numeric" [(ngModel)]="alarm.lowThreshold" name="low-{{i}}" required placeholder="0">
              </div>

              <div class="form-group row-item">
                <label>Max (Gornja)</label>
                <input type="text" inputmode="numeric" [(ngModel)]="alarm.highThreshold" name="high-{{i}}" required placeholder="0">
              </div>

              <button type="button" class="btn-delete-rule" (click)="removeRule(i)">✕</button>
            </div>

            <div *ngIf="sensorData.alarms.length === 0" class="no-rules-msg">
              ⚠️ Morate dodati bar jedno pravilo za generisanje incidenata.
            </div>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="onCancel()">Otkaži</button>
        <button type="submit" class="btn-save" [disabled]="sensorData.alarms.length === 0">Sačuvaj senzor i pravila</button>
      </div>
    </form>

  </div>
</div>
