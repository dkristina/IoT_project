<div class="page-container">
  
  <div class="header-section">
    <h1><mat-icon>sensors</mat-icon> Senzori</h1>
  </div>

  <div class="controls-bar">
    <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
      <mat-label>Pretraga</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ime ili lokacija...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button *ngIf="authService.isAdmin()" mat-raised-button color="primary" (click)="openAddSensor()">
      <mat-icon>add</mat-icon> DODAJ SENZOR
    </button>
  </div>

  <div *ngIf="(loading$ | async) && !(filteredSensors$ | async)?.length" class="spinner-container">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Učitavam senzore...</p>
  </div>

  <div class="table-wrapper" [class.loading-fade]="loading$ | async">
    <table mat-table [dataSource]="(filteredSensors$ | async) || []">
      
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let s"> #{{s.id}} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Naziv </th>
        <td mat-cell *matCellDef="let s"> {{s.name}} </td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef> Lokacija </th>
        <td mat-cell *matCellDef="let s"> {{s.location}} </td>
      </ng-container>

      <ng-container matColumnDef="unit">
        <th mat-header-cell *matHeaderCellDef> Jedinica </th>
        <td mat-cell *matCellDef="let s"> 
          <span class="unit-badge">{{s.unit}}</span> 
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Upravljanje </th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" [routerLink]="['/sensors', s.id]">
            <mat-icon>visibility</mat-icon>
          </button>
          <button *ngIf="authService.isAdmin()" mat-icon-button color="accent" (click)="openEditDialog(s)" matTooltip="Izmeni">
            <mat-icon>edit</mat-icon>
          </button>
          <button *ngIf="authService.isAdmin()" mat-icon-button color="warn" (click)="deleteSensor(s.id)" matTooltip="Obriši">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
