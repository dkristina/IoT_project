<div class="login-container">
  <div class="login-card">
    <h2>IoT Panel Login</h2>
    <p class="subtitle">Unesite podatke za pristup sistemu</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Korisničko ime</label>
        <input type="text" name="username" [(ngModel)]="loginData.username" placeholder="">
      </div>

      <div class="form-group">
        <label>Lozinka</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="">
      </div>

      <div *ngIf="errorMessage" class="error-msg">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Prijavi se</span>
        <span *ngIf="isLoading">Prijava u toku...</span>
      </button>

      <div class="login-footer">
        <a href="javascript:void(0)" (click)="onForgotPassword()">Zaboravili ste lozinku?</a>
      </div>
    </form>

    <div class="copyright">
      © 2026 Smart Industrial IoT System
    </div>
  </div>
</div>
